<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: #f8fafc;
    }
    h2 {
      margin-top: 0;
      font-size: 16px;
      color: #10b981;
    }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #059669, #10b981);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    button:hover {
      background: linear-gradient(135deg, #047857, #059669);
    }
    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    #status {
      margin-top: 12px;
      font-size: 12px;
      color: #94a3b8;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>Job Autofiller</h2>
  <button id="autofill-btn">Auto fill your job application form</button>
  <div id="status">Ready to scan form</div>
  <script src="popup.js"></script>
</body>
</html>
